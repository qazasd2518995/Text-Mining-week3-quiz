        // 从 quiz.html 复制评分逻辑
        function normalize(str) {
            return str
                .toLowerCase()
                .replace(/\s+/g, '')
                .replace(/['"]/g, '"')
                .replace(/\.0+(?=,|$|\))/g, '')
                .replace(/,+/g, ',')
                .replace(/\)$/g, '')
                .trim();
        }

        function parseNumericVector(input) {
            let cleaned = input
                .replace(/[()[\]'"]/g, '')
                .replace(/\s+/g, ' ')
                .trim();
            let numbers = cleaned.split(/[,;\s]+/)
                .map(s => parseFloat(s.trim()))
                .filter(n => !isNaN(n));
            return numbers;
        }

        function checkRCode(userCode, expectedFunc, expectedArg) {
            const normalized = normalize(userCode);
            const variations = [
                `${expectedFunc}(${expectedArg})`,
                `${expectedFunc}(${expectedArg}`,
            ];
            const hasFunc = normalized.includes(expectedFunc);
            const hasArg = normalized.includes(expectedArg.toLowerCase());
            return variations.some(v => normalize(v) === normalized) || (hasFunc && hasArg);
        }

        function checkConditionCode(userCode, expectedFunc, expectedVar, expectedOp, expectedVal) {
            const normalized = normalize(userCode);
            const hasFunc = normalized.includes(expectedFunc);
            const hasVar = normalized.includes(expectedVar);
            const hasOp = normalized.includes(expectedOp);
            const hasVal = normalized.includes(String(expectedVal));
            return hasFunc && hasVar && hasOp && hasVal;
        }

        function checkAnswer(questionId, userAnswer) {
            const answer = answers[questionId];
            if (!answer) return { correct: false, points: 0 };
            if (!userAnswer || userAnswer.trim() === '') return { correct: false, points: 0 };

            const trimmedAnswer = userAnswer.trim();

            switch (answer.type) {
                case 'numeric_vector': {
                    const userVec = parseNumericVector(trimmedAnswer);
                    const expected = answer.expected;
                    if (userVec.length !== expected.length) {
                        let correctCount = 0;
                        for (let i = 0; i < Math.min(userVec.length, expected.length); i++) {
                            if (Math.abs(userVec[i] - expected[i]) <= answer.tolerance) {
                                correctCount++;
                            }
                        }
                        const partial = (correctCount / expected.length) * answer.points;
                        return { correct: false, points: Math.round(partial * 10) / 10 };
                    }
                    const allCorrect = expected.every((val, idx) =>
                        Math.abs(val - userVec[idx]) <= answer.tolerance
                    );
                    if (allCorrect) {
                        return { correct: true, points: answer.points };
                    }
                    let correctCount = 0;
                    expected.forEach((val, idx) => {
                        if (Math.abs(val - userVec[idx]) <= answer.tolerance) {
                            correctCount++;
                        }
                    });
                    const partial = (correctCount / expected.length) * answer.points;
                    return { correct: false, points: Math.round(partial * 10) / 10 };
                }

                case 'numeric': {
                    const numMatch = trimmedAnswer.match(/-?\d+\.?\d*/);
                    if (!numMatch) return { correct: false, points: 0 };
                    const userNum = parseFloat(numMatch[0]);
                    const isCorrect = Math.abs(userNum - answer.expected) <= answer.tolerance;
                    return { correct: isCorrect, points: isCorrect ? answer.points : 0 };
                }

                case 'r_function': {
                    const isCorrect = checkRCode(trimmedAnswer, answer.func, answer.arg);
                    return { correct: isCorrect, points: isCorrect ? answer.points : 0 };
                }

                case 'r_condition': {
                    const isCorrect = checkConditionCode(trimmedAnswer, answer.func, answer.var, answer.op, answer.val);
                    return { correct: isCorrect, points: isCorrect ? answer.points : 0 };
                }

                case 'text_concept': {
                    const lowerAnswer = trimmedAnswer.toLowerCase();
                    let matchedConcepts = 0;
                    answer.concepts.forEach(conceptGroup => {
                        const hasMatch = conceptGroup.some(keyword =>
                            lowerAnswer.includes(keyword.toLowerCase())
                        );
                        if (hasMatch) matchedConcepts++;
                    });
                    const isCorrect = matchedConcepts >= answer.minConcepts;
                    const ratio = matchedConcepts / answer.concepts.length;
                    const earnedPoints = Math.round(ratio * answer.points * 10) / 10;
                    return {
                        correct: isCorrect,
                        points: Math.max(isCorrect ? answer.points : earnedPoints, 0)
                    };
                }

                case 'dataframe_code': {
                    const lowerAnswer = trimmedAnswer.toLowerCase();
                    let matchCount = 0;
                    answer.requiredElements.forEach(element => {
                        if (lowerAnswer.includes(element.toLowerCase())) {
                            matchCount++;
                        }
                    });
                    const isCorrect = matchCount >= answer.minRequired;
                    const ratio = matchCount / answer.requiredElements.length;
                    const earnedPoints = Math.round(ratio * answer.points * 10) / 10;
                    return {
                        correct: isCorrect,
                        points: isCorrect ? answer.points : earnedPoints
                    };
                }

                default:
                    return { correct: false, points: 0 };
            }
        }

        // 测试用例
        // 更新后的评分函数
        function checkRCode(userCode, expectedFunc, expectedArg) {
            const normalized = normalize(userCode);
            const userLower = userCode.toLowerCase().trim();

            const hasFunc = normalized.includes(expectedFunc);
            const hasArg = normalized.includes(expectedArg.toLowerCase());

            // Pipe 写法检查
            const pipePattern = new RegExp(`${expectedArg}\\s*(%>%|\\|>)\\s*${expectedFunc}`, 'i');
            const hasPipe = pipePattern.test(userCode);

            // 命名参数检查
            const namedArgPattern = new RegExp(`${expectedFunc}\\s*\\([^)]*=\\s*${expectedArg}`, 'i');
            const hasNamedArg = namedArgPattern.test(userCode);

            return (hasFunc && hasArg) || hasPipe || hasNamedArg;
        }

        function checkConditionCode(userCode, expectedFunc, expectedVar, expectedOp, expectedVal) {
            const normalized = normalize(userCode);
            const userLower = userCode.toLowerCase();

            const hasFunc = normalized.includes(expectedFunc);
            const hasVar = normalized.includes(expectedVar);
            const hasOp = normalized.includes('>') || normalized.includes('>=');
            const valPattern = new RegExp(String(expectedVal).replace('.', '\\.?'));
            const hasVal = valPattern.test(normalized);

            const altPattern = /length\s*\(\s*study\s*\[\s*study\s*>\s*2\.?5/i;
            const hasAltSyntax = altPattern.test(userCode);

            return (hasFunc && hasVar && hasOp && hasVal) || hasAltSyntax;
        }

        function runTests() {

                        userAnswer: userAnswer || '(未作答)',

                        maxPoints: answers[qId].points
                    });
                });

                totalScore = Math.round(totalScore * 10) / 10;

                <div class="student-section">
                    <h2>${student.name}</h2>
                    <div class="summary">
                        <h2>总分: ${totalScore} / 100</h2>
                    </div>
                `;

                results.forEach(r => {
                    const statusClass = r.correct ? 'correct' : (r.points > 0 ? 'partial' : 'incorrect');
                    const displayAnswer = r.userAnswer.length > 80 ? r.userAnswer.substring(0, 80) + '...' : r.userAnswer;
                    html += `
                    <div class="test-case">
                        <h3>${r.qId}</h3>
                        <p><strong>答案:</strong> <code>${displayAnswer}</code></p>
                        <div class="result ${statusClass}">
                            ${r.correct ? '✓ 正确' : (r.points > 0 ? '~ 部分正确' : '✗ 错误')}
                            - 得分: ${r.points} / ${r.maxPoints}
                        </div>
                    </div>
                    `;
                });

                html += '</div>';
            });

            document.getElementById('testResults').innerHTML = html;
        }

        // 自动运行测试
        runTests();
    </script>
</body>
</html>
